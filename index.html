<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HUB Player</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        #player { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        // ลิงก์ของคุณ
        var rawUrl = 'https://raw.githubusercontent.com/prachyak13/hub/refs/heads/main/hubpremier1.m3u8';
        
        var player = new Clappr.Player({
            source: 'https://corsproxy.io/?' + encodeURIComponent(rawUrl),
            parentId: "#player",
            width: '100%',
            height: '100%',
            autoPlay: true,
            mimeType: "application/x-mpegURL",
            mediacontrol: {seekbar: "#ff0000", buttons: "#eee"},
            preload: 'metadata'
        });
    </script>
</body>
</html>
