<!DOCTYPE html>
<html>
<head>
    <title>Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        video { width: 100vw; height: 100vh; background: #000; }
    </style>
</head>
<body>
    <video id="video" controls autoplay crossorigin="anonymous"></video>
    <script>
        var video = document.getElementById('video');
        // ใช้ Proxy นำหน้าเพื่อปลดล็อกการบล็อกจาก Browser
        var rawUrl = 'https://raw.githubusercontent.com/prachyak13/hub/refs/heads/main/hubpremier1.m3u8';
        var videoSrc = 'https://corsproxy.io/?' + encodeURIComponent(rawUrl);
        
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() { video.play(); });
        }
    </script>
</body>
</html>
